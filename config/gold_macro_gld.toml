[strategy]
instrument_id     = "GLD.ARCA"
bar_type_d        = "GLD.ARCA-1-DAY-LAST-EXTERNAL"
ticker            = "GLD"

[signal]
slow_ma           = 200          # Momentum filter: GLD > SMA(200)
real_rate_window  = 20           # log(TIP/TLT) change lookback
dollar_window     = 20           # DXY log-return lookback

[sizing]
vol_target_pct    = 0.10         # 10% annualized vol target
vol_ewma_span     = 20           # EWMA span for realized vol
max_leverage      = 1.5          # Cap at 1.5x

[risk]
stop_atr_mult     = 2.0          # Hard stop: 2x ATR(14) below entry
atr_period        = 14

[warmup]
warmup_bars       = 252          # 1 year of daily bars
