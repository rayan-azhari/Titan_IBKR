# ── Strategy parameters (mirror GemConfig) ───────────────────────────
lookback_blend_str = "3,6,12"          # multi-speed momentum blend (unchanged from C12/J3/J4)
absolute_gate_lookback_months = 12     # canonical 12m for defensive switch (unchanged)
buffer_pct = 0.005                     # 0.5% buffer to reduce churn (unchanged)
defensive_switch = true                # unchanged

# Vol-target overlay (J5: vol_target=0.05, halflife=60)
ann_vol_target = 0.05                  # *** J5 CHANGE: 0.10 -> 0.05 (L57) ***
vol_lookback_days = 20                 # rolling-std fallback window (unused at EWMA setting)
max_leverage = 2.0                     # 2x cap; rarely binds at vt=0.05 (L57)

# Vol estimator (J4 EWMA path retained; J5 changes halflife only)
vol_estimator_kind = "ewma"            # unchanged from J4
vol_estimator_halflife = 60            # *** J5 CHANGE: 40 -> 60 (noise axis = best) ***

# Stress gate (Step 4) -- OFF; continuous vol-target preferred
stress_gate_enabled = false

# Drawdown circuit breaker (Step 5) -- OFF; redundant with vol-target
dd_breaker_enabled = false

# ── Execution + ops ─────────────────────────────────────────────────
execution_mode = "etf"                  # "etf" or "mes". Start ETF for paper.
rebalance_threshold_weight = 0.05      # buffer order submission

warmup_bars = 380                       # 18 months for the longest lookback
initial_equity = 30_000.0
base_ccy = "USD"
# Informational; the audit harness uses the realistic cost model
# (see research/gem/run_gem_audit.py and V3.6 L23). At J5 vt=0.05 the
# cost drag is +0.03 Sharpe (well below the 0.10 gate); cost is not the
# binding constraint.
cost_bps_per_turnover = 6.0            # ETF spread+slip per side; MES uses 1.0
