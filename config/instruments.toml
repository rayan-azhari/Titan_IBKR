# ──────────────────────────────────────────────────────────
# instruments.toml — Instruments and granularities to trade
# ──────────────────────────────────────────────────────────
# ORB trading focus: Stocks (M5 and Daily)

[instruments]
pairs = [
    "UNH",
    "WMT",
    "AMAT",
    "TXN",
    "CRM",
    "CSCO",
    "INTC"
]

granularities = [
    "M5",    # 5-minute candles (ORB execution)
    "D",     # Daily candles (SMA/RSI filters)
]
