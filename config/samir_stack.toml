# Samir-Stack live configuration — IBKR UK paper account (GBP base).
#
# 2026-05-13 config: MES futures equity sleeve + IGLT bond sleeve.
# Replaces the earlier 3USL.LSEETF synthetic-3x ETF deployment.
# Rationale: avoid daily-rebalanced leveraged ETF compounding decay;
# get leverage from MES futures (notional ≈ $5 × SPX index, posted
# margin ≈ 6%) instead.
#
# Phase 5 sweep ranking (futures + IGLT + capitulation cells):
#   ew=0.40 L=2: Calmar CI lo 0.137 (best — this config)
#   ew=0.40 L=3: Calmar CI lo 0.107
#   ew=0.30 L=4: Calmar CI lo 0.079
# L=2 dominates higher L due to vol drag at the strategy level. The
# operator can move toward L=3 by editing L_max + tier_thresholds if
# more aggressive sizing is desired; Phase 5 data documents the
# Calmar trade-off.
#
# Phase 5 validation (with capitulation on, 14y backtest 2010-2026):
#   WFO stitched Sharpe 0.940 | CI lo 0.407
#   Calmar CI lo 0.137 | Sanctuary Sharpe 1.02
#   MC P(MaxDD>50%) < 1% (RoR-acceptable).
#
# IMPORTANT: capitulation overlay is NOT yet wired into the live
# strategy class (Phase 6b follow-up). This deployment runs without
# the overlay; expected live Sharpe is ~0.88 vs the with-cap 0.94.

[strategy]
# Trading instruments — MES front-month + UK gilts.
#
# MES contract symbol uses IB-style front-month encoding:
#   MES{month_code}{year} where month_code is H/M/U/Z for Mar/Jun/Sep/Dec.
# The operator MUST update this manually at each quarterly roll:
#   - Around 8 business days before expiry, switch to next contract.
#   - See directives/Samir-Stack Strategy Guide.md §8.3 for the roll
#     procedure.
equity_instrument_id = "MESM26.CME"      # June 2026 front-month at deploy time
bond_instrument_id   = "IGLT.LSEETF"     # UK 7-10y gilts (GBP-native)

# Signal data sources (subscribed but not traded)
signal_spy_id = "SPY.ARCA"
signal_vix_id = "VIX.CBOE"
signal_hyg_id = "HYG.ARCA"
signal_ief_id = "IEF.NASDAQ"

# Bar types (all daily).
bar_type_equity_d  = "MESM26.CME-1-DAY-LAST-EXTERNAL"
bar_type_bond_d    = "IGLT.LSEETF-1-DAY-LAST-EXTERNAL"
bar_type_spy_d     = "SPY.ARCA-1-DAY-LAST-EXTERNAL"
bar_type_vix_d     = "VIX.CBOE-1-DAY-LAST-EXTERNAL"
bar_type_hyg_d     = "HYG.ARCA-1-DAY-LAST-EXTERNAL"
bar_type_ief_d     = "IEF.NASDAQ-1-DAY-LAST-EXTERNAL"

# Per-instrument quote currency
equity_quote_ccy = "USD"   # MES is USD-quoted (CME)
bond_quote_ccy   = "GBP"   # IGLT is GBP-native

# FX rate seed (GBP base): 1 USD = how many GBP.
# At 2026-04-02: GBPUSD = 1.33 → 1 USD = 0.7519 GBP.
fx_rate_equity_quote_to_base = 0.7519
fx_rate_bond_quote_to_base   = 1.0  # bond sleeve GBP-native

# Strategy parameters — best futures+IGLT cell from Phase 5 sweep.
equity_weight = 0.40
bond_weight   = 0.60
L_max         = 2.0
tier_thresholds   = [0.30, 0.55]
hysteresis_buffer = 0.05
re_entry_quiet_bars = 20

# Native leverage of the equity-trading instrument.
# For MES FUTURES this is 1.0 — the strategy holds N contracts where
# N is sized so that contract_notional × N matches the target levered
# notional (equity_weight × tier × NAV). The leverage comes from the
# futures contract itself (notional >> posted margin), not from the
# instrument carrying built-in compounding leverage.
#
# Contrast with leveraged ETFs (3USL, UPRO) where native_leverage=3
# because each share represents 3× the underlying index exposure.
equity_native_leverage = 1.0

# DD circuit breaker (unchanged from prior config)
dd_throttle = 0.10
dd_kill     = 0.15
dd_re_entry_score = 0.70
dd_re_entry_bars  = 5

# Vol-targeting overlay — DISABLED per Phase 5 finding.
vol_target_annual = 0.0
vol_target_window = 30
vol_target_max_scale = 2.0

# Futures execution — ON. The strategy holds MES contracts and sizes
# them by integer-flooring the target notional / contract_notional.
# Cf. Phase 4 finding: chunky-contract sizing produces a small CAGR
# drag (-0.04pp at £30k NAV); operational floor is NAV ≥ £30k for
# clean fills.
equity_is_future = true
futures_multiplier = 5.0   # MES: $5 per index point. ES is 50.

# Phase 3 bond rotation — OFF. Phase 3 rejected the IGLT/IGLS rotation
# on the operational churn gate (22+ flips/year at 60d lookback).
bond_rotation_instruments = []
bond_rotation_bar_types   = []
bond_rotation_lookback_days = 60

# Operational — base currency = GBP for IBKR UK paper
initial_equity   = 30000.0     # raised from £10k — Phase 4 operational floor
base_ccy         = "GBP"
warmup_bars      = 250
rebalance_min_pct_change = 0.05

# PortfolioRiskManager id (must match registration)
prm_id = "samir_stack"
