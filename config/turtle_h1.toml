[system2]
description    = "Trend-following S2 — 45-bar entry / 30-bar exit"
instrument_id  = "CAT.USD"
bar_type       = "CAT.USD-1-HOUR-MID-EXTERNAL"
entry_period   = 45
exit_period    = 30
atr_period     = 20
risk_pct       = 0.01
stop_atr_mult  = 2.0
max_leverage   = 1.5
flat_before_earnings = false
use_moc_fill   = true
direction      = "long_only"
timeframe      = "H1"

# Pyramiding & Trailing
max_units        = 4
pyramid_atr_mult = 0.5
use_trailing_stop = true
